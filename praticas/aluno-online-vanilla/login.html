<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Aluno Online</title>
  </head>
  <body class="tudo">


    <main class="geral">

      <header class="cabecalho">
        <img class="imagem" src="/learn.svg" alt="logotipo" />

        <h1 class="titulo">Aluno Online</h1>
      </header>

      <form>
        <label for="email">E-mail</label>
        <input class="input-01" type="email" id="email" name="email" />
        <p id="emailErro" class="text"></p>

        <label for="senha">Senha</label>
        <input class="input-01" type="password" id="senha" name="senha" />
        <p id="senhaErro" class="text"></p>
      </form>
      
       
      <button class="button">Entrar</button>

    </main>
    <script type="module" src="main.js"></script>
  </body>
</html>
